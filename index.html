<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>書庫系統</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <i class="fa-solid fa-book-bookmark" style="font-size:20px; color:#fff;"></i>
      <span class="header-title">書庫系統</span>
    </div>
    <div class="header-right">
      <div class="user-dropdown">
        <button class="user-toggle" id="user-toggle" onclick="toggleDropdown()">
          <i id="user-icon" class="fa-solid fa-user" style="font-size:15px;color:#F5C9C9;"></i>
          <span id="header-username"></span>
          <span class="arrow">▼</span>
        </button>
        <div class="dropdown-menu" id="dropdown-menu">
          <div class="dropdown-header">
            <div class="dropdown-label">目前登入</div>
            <div class="dropdown-username" id="dropdown-username"></div>
          </div>
          <button class="dropdown-item" onclick="handleLogout()">
            登出
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 主內容 -->
  <div class="main">

    <!-- 工具列 -->
    <div class="toolbar">
      <div class="search-wrapper">
        <input class="search-input" id="search-input" type="text" placeholder="搜尋書名、作者、出版社或 ISBN..." oninput="handleSearchInput()" />
        <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
      </div>
      <button class="search-btn" onclick="handleSearch()">搜尋</button>
      <button class="add-btn" id="add-btn" onclick="openAddModal()">＋ 新增書籍</button>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-grid" onclick="switchView('grid')" title="卡片模式">⊞</button>
        <button class="view-btn" id="btn-list" onclick="switchView('list')" title="清單模式">≡</button>
      </div>
    </div>

    <!-- 載入動畫 -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="scene">
        <div class="book-open">
          <div class="cover-left"></div>
          <div class="cover-right"></div>
          <div class="left-page">
            <div class="bl"></div><div class="bl short"></div><div class="bl"></div><div class="bl short"></div><div class="bl"></div><div class="bl short"></div>
          </div>
          <div class="spine-center"></div>
          <div class="right-page">
            <div class="bl"></div><div class="bl"></div><div class="bl short"></div><div class="bl"></div><div class="bl short"></div><div class="bl"></div>
          </div>
          <div class="flip-page fp1"><div class="bl"></div><div class="bl short"></div><div class="bl"></div></div>
          <div class="flip-page fp2"><div class="bl"></div><div class="bl short"></div></div>
          <div class="flip-page fp3"><div class="bl"></div><div class="bl"></div></div>
          <div class="flip-page fp4"><div class="bl short"></div><div class="bl"></div></div>
          <div class="flip-page fp5"><div class="bl"></div></div>
          <div class="flip-page fp6"></div>
          <div class="book-shadow"></div>
        </div>
      </div>
      <div class="loading-text">載入中...</div>
    </div>

    <!-- 書籍卡片區 -->
    <div class="book-grid" id="book-grid"></div>

    <!-- 書籍清單區 -->
    <div id="book-list" style="display:none;">
      <table class="book-table">
        <thead>
          <tr>
            <th>書名</th>
            <th>作者</th>
            <th>出版社</th>
            <th>ISBN</th>
            <th>價格</th>
            <th id="th-actions" style="display:none;">連結</th>
          </tr>
        </thead>
        <tbody id="book-table-body"></tbody>
      </table>
    </div>

    <!-- 空狀態 -->
    <div class="empty-state" id="empty-state"></div>

    <!-- 分頁 -->
    <div class="pagination" id="pagination"></div>

  </div>

  <!-- 刪除確認 Modal -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-modal">
      <div class="confirm-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#CC3333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </div>
      <div class="confirm-title">確定要刪除這本書籍嗎？</div>
      <div class="confirm-desc">此操作無法復原，書籍資料將會永久刪除。</div>
      <div class="confirm-actions">
        <button class="confirm-cancel" onclick="closeConfirm()">取消</button>
        <button class="confirm-delete" onclick="confirmDelete()">確認刪除</button>
      </div>
    </div>
  </div>

  <!-- 新增／修改 Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-title">新增書籍</div>

      <div class="modal-form-group">
        <label>書名 *</label>
        <input type="text" id="f-title" placeholder="請輸入書名" />
      </div>
      <div class="modal-form-group">
        <label>作者 *</label>
        <input type="text" id="f-author" placeholder="請輸入作者" />
      </div>
      <div class="modal-form-group">
        <label>出版社 *</label>
        <input type="text" id="f-publisher" placeholder="請輸入出版社" />
      </div>
      <div class="modal-form-group">
        <label>ISBN *</label>
        <input type="text" id="f-isbn" placeholder="請輸入 ISBN" />
      </div>
      <div class="modal-form-group">
        <label>價格 *</label>
        <input type="number" id="f-price" placeholder="請輸入價格" min="0" />
      </div>
      <div class="modal-form-group">
        <label>書籍網址 *</label>
        <input type="url" id="f-url" placeholder="請輸入書籍相關網址" />
      </div>

      <div class="modal-error" id="modal-error"></div>

      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal()">取消</button>
        <button class="modal-submit" onclick="handleSubmit()">確認送出</button>
      </div>
    </div>
  </div>

  <script src="js/book.js"></script>
</body>
</html>
